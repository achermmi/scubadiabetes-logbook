name: WordPress CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  wordpress-ci:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHPCS and WordPress Coding Standards
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Debug PHPCS standards
        run: |
          ./vendor/bin/phpcs --version
          ./vendor/bin/phpcs -i

      - name: Run PHPCS
        run: |
          echo "## PHPCS Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./vendor/bin/phpcs -n 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
